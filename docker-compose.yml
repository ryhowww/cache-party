services:
  wordpress:
    image: wordpress:6.7-php8.2-apache
    ports:
      - "8085:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: cache_party
    volumes:
      - wp_data:/var/www/html
      - ./wordpress-plugin:/var/www/html/wp-content/plugins/cache-party
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: cache_party
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  wp_data:
  db_data:
